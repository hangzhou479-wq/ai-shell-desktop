name: Build AI Shell

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install dependencies
        run: npm install

      - name: Build macOS
        run: npx electron-builder --mac --publish=never

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AI-Shell-macOS
          path: dist/AI Shell-*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npx electron-builder --win --publish=never

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: AI-Shell-Windows
          path: dist/AI Shell Setup*.exe
