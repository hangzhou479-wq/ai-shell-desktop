name: Build AI-Shell

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ============================================
  # macOS
  # ============================================
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build
        run: bash build_mac.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Shell-macOS
          path: dist/AI-Shell-*.dmg

  # ============================================
  # Windows
  # ============================================
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build
        run: bash build_win.sh
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Shell-Windows
          path: dist/AI-Shell-*.zip
