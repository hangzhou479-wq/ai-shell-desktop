    <!-- 内面珠光 -->
    <path d="M256 380 C256 380, 120 345, 110 260 C105 210, 115 155, 135 125 C150 105, 180 85, 256 85 C332 85, 362 105, 377 125 C397 155, 407 210, 402 260 C392 345, 256 380, 256 380Z" fill="url(#inner)"/>

    <!-- 放射纹路 -->
    <g stroke="#ff9800" stroke-width="1.8" stroke-opacity="0.25" fill="none" stroke-linecap="round">
      <path d="M256 400 C256 300, 170 240, 68 240"/><path d="M256 400 C256 300, 175 200, 80 170"/>
      <path d="M256 400 C256 300, 190 165, 98 115"/><path d="M256 400 C256 280, 210 135, 125 65"/>
      <path d="M256 400 C256 260, 220 110, 155 42"/><path d="M256 400 C256 240, 240 80, 190 28"/>
      <path d="M256 400 C256 240, 272 80, 322 28"/><path d="M256 400 C256 260, 292 110, 357 42"/>
      <path d="M256 400 C256 280, 302 135, 387 65"/><path d="M256 400 C256 300, 322 165, 414 115"/>
      <path d="M256 400 C256 300, 337 200, 432 170"/><path d="M256 400 C256 300, 342 240, 444 240"/>
    </g>

    <!-- 波浪上缘 -->
    <path d="M68 240 C68 240, 80 215, 100 200 C115 210, 130 225, 155 205 C170 215, 185 230, 210 215 C225 220, 240 230, 256 225 C272 230, 287 220, 302 215 C327 230, 342 215, 357 205 C382 225, 397 210, 412 200 C432 215, 444 240, 444 240" fill="none" stroke="#ff9800" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"/>

    <!-- 珍珠 -->
    <circle cx="256" cy="200" r="14" fill="white" opacity="0.75"/>
    <circle cx="256" cy="198" r="5" fill="white" opacity="0.95"/>
    <circle cx="253" cy="196" r="2" fill="white"/>
  </g>

  <ellipse cx="256" cy="422" rx="12" ry="8" fill="#e65100" opacity="0.3"/>
