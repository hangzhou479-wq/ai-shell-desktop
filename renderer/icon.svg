<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8f0;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ffe0b2;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ffcc80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#fff3e0;stop-opacity:0.4" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#e65100" flood-opacity="0.15"/>
    </filter>
  </defs>

  <circle cx="256" cy="230" r="200" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <!-- 底壳 -->
    <path d="M256 430 C256 430, 60 380, 45 260 C35 190, 50 120, 80 90 C100 60, 150 30, 256 30 C362 30, 412 60, 432 90 C462 120, 477 190, 467 260 C452 380, 256 430, 256 430Z" fill="#e65100" opacity="0.2"/>

